name: build-dist

on:
  push:
    branches: [master]

permissions: {}

concurrency:
  group: build-dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # reads the pnpm version from the packageManager field
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Package dist
        run: |
          (cd dist && zip -qr ../dist.zip .)
          sha256sum dist.zip > dist.zip.sha256
          echo "TAG=build-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist.zip

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" dist.zip dist.zip.sha256 \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "Frontend build of \`$GITHUB_SHA\`."

      # keep the 10 newest build releases; older ones only serve checkouts
      # that a git pull has already moved past
      - name: Prune old build releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("build-")))]
                  | sort_by(.createdAt) | reverse | .[10:][].tagName' |
          while read -r tag; do
            gh release delete "$tag" --yes --cleanup-tag
          done
